<!DOCTYPE html>
<html>
<head>
    <title>Trip Plan - Milestone 3 Full Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: Arial, sans-serif; }
        #map { height: 100vh; height: 100dvh; width: 100vw; }
        
        /* MILESTONE 2 DASHBOARD STYLING */
        #layer-toggle-btn {
            background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px; 
            width: 38px; height: 38px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 20px; 
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        #menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.5); z-index: 999; backdrop-filter: blur(2px);
        }
        #custom-layer-panel {
            display: none; background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.4); max-height: 80vh; overflow-y: auto;
            font-family: Arial, sans-serif; font-size: 13px; color: #333; width: max-content;
            position: relative; z-index: 1001;
        }
        .layer-columns { display: flex; flex-direction: row; gap: 20px; }
        .layer-column { display: flex; flex-direction: column; min-width: 140px; }
        .layer-column h4 { margin: 0 0 10px 0; border-bottom: 2px solid #ddd; padding-bottom: 5px; font-size: 14px; color: #111; }
        .layer-label { display: flex; align-items: center; margin-bottom: 6px; cursor: pointer; padding: 4px 0; }
        .layer-label input { margin-right: 8px; transform: scale(1.1); cursor: pointer; }
        .master-toggle { font-weight: bold; background: #eef2f5; padding: 8px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #d0d7de; }
        .close-btn { float: right; cursor: pointer; font-weight: bold; color: #d9534f; background: #f9f9f9; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;}
        .refresh-btn { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; display: block; text-align: center; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            #custom-layer-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92vw; max-width: 400px; max-height: 85dvh; box-sizing: border-box; font-size: 15px; border-radius: 12px; padding: 20px; }
            .layer-columns { flex-direction: column; gap: 15px; }
            .layer-column { background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #eaeaea; }
            .layer-label { padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
            .layer-label input { transform: scale(1.4); margin-right: 12px; }
        }

        /* POPUP & BADGE STYLING */
        #loading { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 8px 15px; border-radius: 5px; font-weight: bold; border: 2px solid rgba(0,0,0,0.2); }
        .info-box { font-size: 13px; line-height: 1.4; min-width: 240px; }
        .hotel-badge { background-color: #e8f4f8; border: 1px solid #3498db; padding: 6px; border-radius: 4px; margin-top: 8px; }
        .alt-badge { background:#ffdddd; color:#c0392b; padding:6px; border-radius:4px; font-weight:bold; margin-top:8px; font-size:12px; border: 1px solid #e74c3c; }
        .mountain-warn { background:#fcf3cf; border: 1px solid #f1c40f; padding:8px; border-radius:4px; color:#d35400; font-size:12px; margin-top:10px; font-weight:bold; }
        .sos-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loading">🚀 Loading Expedition... <span id="prog"></span></div>
    <div id="menu-overlay"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CSV_URL = `https://docs.google.com/spreadsheets/d/1EzJ4cRVo-qj0ciKSfd1dWFLKh3zzH60HMDWh9GDmtJY/export?format=csv&gid=327253181`;

        const cityCoords = {
            'Trivandrum': [8.5241, 76.9366], 'Bangalore': [12.9716, 77.5946], 'Hyderabad': [17.3850, 78.4867],
            'Nagpur': [21.1458, 79.0882], 'Kota': [25.1825, 75.8391], 'Jaipur': [26.9124, 75.7873],
            'Amritsar': [31.6340, 74.8723], 'Srinagar': [34.0837, 74.7973], 'Kargil': [34.5539, 76.1330],
            'Leh': [34.1526, 77.5771], 'Nubra': [34.6863, 77.5673], 'Pangong': [33.7595, 78.6674],
            'Jispa': [32.6455, 77.1806], 'Manali': [32.2396, 77.1887], 'Shimla': [31.1048, 77.1734],
            'Agra': [27.1767, 78.0081], 'Jhansi': [25.4484, 78.5685], 'Shivpuri': [25.4295, 77.6536], 'Tonk': [26.1666, 75.7895]
        };

        const highAlt = {'Dras': 10826, 'Lamayuru': 11520, 'Leh': 11482, 'Khardung La': 17582, 'Nubra': 10000, 'Pangong': 13862, 'Sarchu': 14070, 'Jispa': 10500};

        var map = L.map('map', {zoomControl: false}).setView([22.0, 78.0], 5);
        L.control.zoom({position: 'topright'}).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        var dayGroups = {};
        var markerGroup = L.layerGroup().addTo(map);

        async function init() {
            const cached = localStorage.getItem('master_trip_cache_v5');
            if (cached) { renderTrip(JSON.parse(cached)); } 
            else { fetchSheet(); }
        }

        async function fetchSheet() {
            try {
                let resp = await fetch(CSV_URL);
                if (!resp.ok) resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL));
                const text = await resp.text();
                const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
                const headers = rows[0];
                let itinerary = [];
                for(let i=1; i < rows.length; i++) {
                    if (rows[i].length < 3) continue;
                    let rowData = {};
                    rows[i].forEach((val, idx) => { if(headers[idx]) rowData[headers[idx]] = val; });
                    if(rowData['To']) itinerary.push(rowData);
                }
                localStorage.setItem('master_trip_cache_v5', JSON.stringify(itinerary));
                renderTrip(itinerary);
            } catch (e) { document.getElementById('loading').innerHTML = "⚠️ Connection Error. Use Sync button."; }
        }

        async function renderTrip(data) {
            let lastPoint = cityCoords['Trivandrum'];
            setupDashboardStructure();

            for (let row of data) {
                let day = row['Day'];
                let currentGroup = L.layerGroup().addTo(map);
                dayGroups[day] = currentGroup;
                addDayToMenu(day);

                let lat = parseFloat(row['Lat']), lng = parseFloat(row['Lng']);
                let currentPoint = (!isNaN(lat) && !isNaN(lng)) ? [lat, lng] : cityCoords[row['To']];

                if (currentPoint) {
                    // Marker stay
                    let altTag = highAlt[row['To']] ? `<div class="alt-badge">⚠️ Altitude: ~${highAlt[row['To']].toLocaleString()} ft</div>` : "";
                    L.marker(currentPoint, {
                        icon: L.divIcon({ html: `<div style="background:#e74c3c; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`, className: '', iconSize: [12, 12] })
                    }).bindPopup(`<div class="info-box"><b>📍 ${row['To']}</b><br>${row['Date']}${altTag}<div class="hotel-badge">🏨 Stay: <b>${row['Night Stay']}</b><br><i>${row['Notes'] || ''}</i></div></div>`).addTo(markerGroup);

                    // Routing Logic
                    let cacheKey = `route_final_${row['From']}_${row['To']}_${JSON.stringify(currentPoint)}`;
                    let cachedRoute = localStorage.getItem(cacheKey);
                    let poly;

                    if (cachedRoute) poly = JSON.parse(cachedRoute);
                    else {
                        try {
                            let r = await fetch(`https://router.project-osrm.org/route/v1/driving/${lastPoint[1]},${lastPoint[0]};${currentPoint[1]},${currentPoint[0]}?overview=full&geometries=geojson`);
                            let res = await r.json();
                            if(res.routes?.[0]) { poly = res.routes[0].geometry.coordinates.map(c => [c[1], c[0]]); localStorage.setItem(cacheKey, JSON.stringify(poly)); }
                            await new Promise(res => setTimeout(res, 500));
                        } catch (e) { console.warn("Route skip"); }
                    }

                    if(poly) {
                        L.polyline(poly, { color: 'white', weight: 10, opacity: 0.4 }).addTo(currentGroup);
                        let mWarn = (parseInt(day) >= 8 && parseInt(day) <= 17) ? `<div class="mountain-warn">🌙 Himalayan Alert: Reach by 5:30 PM.</div>` : "";
                        L.polyline(poly, { color: '#3498db', weight: 6, opacity: 0.9 })
                            .bindPopup(`<div class="info-box">
                                <h3 style="margin:0 0 10px 0; border-bottom:2px solid #3498db; padding-bottom:5px;">🗓️ Day ${day} - ${row['Date']}</h3>
                                <b>🛣️ Route:</b> ${row['From']} ➔ ${row['To']}<br>
                                <b>⭐ Stops:</b> ${row['Key Stops']}<br>
                                <b>📏 Distance:</b> ${row['Distance']} | <b>⏱️ Time:</b> ${row['Drive Time']}<br>
                                <b>🚧 Road:</b> ${row['Road Condition']}
                                ${mWarn}
                            </div>`).addTo(currentGroup);
                    }
                    lastPoint = currentPoint;
                }
                document.getElementById('prog').innerText = `Day ${day}...`;
            }
            document.getElementById('loading').style.display = 'none';
            attachMenuLogic();
        }

        function setupDashboardStructure() {
            var ctrl = L.control({position: 'topright'});
            ctrl.onAdd = function() {
                var div = L.DomUtil.create('div', 'leaflet-control-custom');
                div.innerHTML = `
                    <div id="layer-toggle-btn">🗺️</div>
                    <div id="custom-layer-panel">
                        <div style="margin-bottom:15px;"><span class="close-btn" id="close-btn">❌ Close</span><b>Map Dashboard</b></div>
                        <div class="layer-columns">
                            <div class="layer-column" id="onward-col">
                                <label class="layer-label master-toggle"><input type="checkbox" id="onward-all" checked> Onward (1-11)</label>
                                <h4>Routes</h4>
                            </div>
                            <div class="layer-column" id="return-col">
                                <label class="layer-label master-toggle"><input type="checkbox" id="return-all" checked> Return (12-23)</label>
                                <h4>Routes</h4>
                            </div>
                        </div>
                        <button class="refresh-btn" onclick="localStorage.clear(); location.reload();">🔄 Sync Sheet & Refresh</button>
                    </div>`;
                return div;
            };
            ctrl.addTo(map);
        }

        function addDayToMenu(day) {
            let d = parseInt(day);
            let col = document.getElementById(d <= 11 ? 'onward-col' : 'return-col');
            let label = L.DomUtil.create('label', 'layer-label', col);
            label.innerHTML = `<input type="checkbox" class="day-check" data-day="${day}" checked> Day ${day}`;
        }

        function attachMenuLogic() {
            document.getElementById('layer-toggle-btn').onclick = () => { document.getElementById('custom-layer-panel').style.display = 'block'; document.getElementById('menu-overlay').style.display = 'block'; };
            document.getElementById('close-btn').onclick = document.getElementById('menu-overlay').onclick = () => { document.getElementById('custom-layer-panel').style.display = 'none'; document.getElementById('menu-overlay').style.display = 'none'; };

            document.getElementById('onward-all').onchange = function() {
                let s = this.checked;
                document.querySelectorAll('.day-check').forEach(cb => {
                    if(parseInt(cb.dataset.day) <= 11) { cb.checked = s; s ? map.addLayer(dayGroups[cb.dataset.day]) : map.removeLayer(dayGroups[cb.dataset.day]); }
                });
            };
            document.getElementById('return-all').onchange = function() {
                let s = this.checked;
                document.querySelectorAll('.day-check').forEach(cb => {
                    if(parseInt(cb.dataset.day) >= 12) { cb.checked = s; s ? map.addLayer(dayGroups[cb.dataset.day]) : map.removeLayer(dayGroups[cb.dataset.day]); }
                });
            };
            document.querySelectorAll('.day-check').forEach
