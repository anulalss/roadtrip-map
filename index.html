<!DOCTYPE html>
<html>
<head>
    <title>Trip Plan - Dashboard & Live Sync</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: Arial, sans-serif; }
        #map { height: 100vh; height: 100dvh; width: 100vw; }
        
        /* Dashboard Styling */
        #layer-toggle-btn {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px; 
            width: 40px; height: 40px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 20px; 
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.5); z-index: 1001; backdrop-filter: blur(2px); }
        #custom-layer-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 12px; 
            width: 90vw; max-width: 420px; max-height: 85vh; overflow-y: auto;
            z-index: 1002; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        
        .layer-columns { display: flex; flex-direction: row; gap: 20px; }
        .layer-column { flex: 1; display: flex; flex-direction: column; }
        .layer-column h4 { margin: 12px 0 8px 0; border-bottom: 2px solid #3498db; padding-bottom: 5px; font-size: 14px; color: #333; }
        .layer-label { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f2f2f2; cursor: pointer; font-size: 14px; }
        .layer-label input { margin-right: 12px; transform: scale(1.3); }
        .master-toggle { font-weight: bold; color: #1a73e8; background: #f0f7ff; padding: 5px; border-radius: 4px; }
        
        #loading { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 8px 15px; border-radius: 5px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .info-box { font-size: 13px; line-height: 1.4; min-width: 220px; }
        .hotel-tag { background: #e8f4f8; border: 1px solid #3498db; padding: 6px; border-radius: 4px; margin-top: 8px; font-weight: bold; display: block; color: #2980b9; }
        .refresh-btn { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 14px; }
        .close-btn { float: right; cursor: pointer; color: #e74c3c; font-weight: bold; font-size: 18px; }
        .sos-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loading">🚀 Initializing Expedition Map...</div>
    <div id="layer-toggle-btn">🗺️</div>
    <div id="menu-overlay"></div>
    <div id="custom-layer-panel">
        <span class="close-btn" id="close-menu">✖</span>
        <h3 style="margin-top:0">Map Dashboard</h3>
        
        <div class="layer-columns">
            <div class="layer-column" id="onward-col">
                <div class="master-toggle"><label><input type="checkbox" id="onward-all" checked> Onward (1-11)</label></div>
                <h4>Daily Routes</h4>
            </div>
            <div class="layer-column" id="return-col">
                <div class="master-toggle"><label><input type="checkbox" id="return-all" checked> Return (12-23)</label></div>
                <h4>Daily Routes</h4>
            </div>
        </div>

        <button class="refresh-btn" onclick="localStorage.clear(); location.reload();">🔄 Sync Sheet & Update Map</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SHEET_ID = '1EzJ4cRVo-qj0ciKSfd1dWFLKh3zzH60HMDWh9GDmtJY';
        const GID = '327253181';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        const cityCoords = {
            'Trivandrum': [8.5241, 76.9366], 'Bangalore': [12.9716, 77.5946], 'Hyderabad': [17.3850, 78.4867],
            'Nagpur': [21.1458, 79.0882], 'Kota': [25.1825, 75.8391], 'Jaipur': [26.9124, 75.7873],
            'Amritsar': [31.6340, 74.8723], 'Srinagar': [34.0837, 74.7973], 'Kargil': [34.5539, 76.1330],
            'Leh': [34.1526, 77.5771], 'Nubra': [34.6863, 77.5673], 'Pangong': [33.7595, 78.6674],
            'Jispa': [32.6455, 77.1806], 'Manali': [32.2396, 77.1887], 'Shimla': [31.1048, 77.1734],
            'Agra': [27.1767, 78.0081], 'Jhansi': [25.4484, 78.5685]
        };

        var map = L.map('map', {zoomControl: false}).setView([22.0, 78.0], 5);
        L.control.zoom({position: 'topright'}).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        var dayGroups = {};
        var markerGroup = L.layerGroup().addTo(map);

        async function init() {
            const cached = localStorage.getItem('trip_cache_final');
            if (cached) {
                renderTrip(JSON.parse(cached));
            } else {
                fetchSheet();
            }
        }

        async function fetchSheet() {
            try {
                let resp = await fetch(CSV_URL);
                if (!resp.ok) resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL));
                const text = await resp.text();
                const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
                const headers = rows[0];
                let itinerary = [];
                for(let i=1; i < rows.length; i++) {
                    if (rows[i].length < 3) continue;
                    let rowData = {};
                    rows[i].forEach((val, idx) => { if(headers[idx]) rowData[headers[idx]] = val; });
                    if(rowData['To']) itinerary.push(rowData);
                }
                localStorage.setItem('trip_cache_final', JSON.stringify(itinerary));
                renderTrip(itinerary);
            } catch (e) { document.getElementById('loading').innerHTML = "⚠️ Sheet Connection Failed."; }
        }

        async function renderTrip(data) {
            let lastPoint = cityCoords['Trivandrum'];

            for (let row of data) {
                let day = row['Day'];
                let currentGroup = L.layerGroup().addTo(map);
                dayGroups[day] = currentGroup;

                // Create Checkbox UI
                createCheckboxUI(day);

                let lat = parseFloat(row['Lat']), lng = parseFloat(row['Lng']);
                let currentPoint = (!isNaN(lat) && !isNaN(lng)) ? [lat, lng] : cityCoords[row['To']];

                if (currentPoint) {
                    // Marker stay
                    L.marker(currentPoint, {
                        icon: L.divIcon({ html: `<div style="background:#e74c3c; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`, className: '', iconSize: [12, 12] })
                    }).bindPopup(`<div class="info-box"><b>📍 ${row['To']}</b><br>${row['Date']}<div class="hotel-tag">🏨 Stay: ${row['Night Stay']}</div></div>`).addTo(markerGroup);

                    // Routing Logic
                    let cacheKey = `route_v10_${row['From']}_${row['To']}_${JSON.stringify(currentPoint)}`;
                    let cachedRoute = localStorage.getItem(cacheKey);
                    let poly;

                    if (cachedRoute) poly = JSON.parse(cachedRoute);
                    else {
                        try {
                            let r = await fetch(`https://router.project-osrm.org/route/v1/driving/${lastPoint[1]},${lastPoint[0]};${currentPoint[1]},${currentPoint[0]}?overview=full&geometries=geojson`);
                            let res = await r.json();
                            if(res.routes?.[0]) { 
                                poly = res.routes[0].geometry.coordinates.map(c => [c[1], c[0]]); 
                                localStorage.setItem(cacheKey, JSON.stringify(poly)); 
                            }
                            await new Promise(res => setTimeout(res, 600));
                        } catch (e) { console.warn("Routing skipped for Day " + day); }
                    }

                    if(poly) {
                        L.polyline(poly, { color: 'white', weight: 10, opacity: 0.4 }).addTo(currentGroup);
                        L.polyline(poly, { color: '#3498db', weight: 6, opacity: 0.9 })
                            .bindPopup(`<div class="info-box">
                                <h3 style="margin:0 0 10px 0; border-bottom:2px solid #3498db; padding-bottom:5px;">🗓️ Day ${day} - ${row['Date']}</h3>
                                <b>🛣️ Route:</b> ${row['From']} ➔ ${row['To']}<br>
                                <b>⭐ Key Stops:</b> ${row['Key Stops']}<br>
                                <span class="hotel-tag">🏨 Stay: ${row['Night Stay']}</span>
                            </div>`).addTo(currentGroup);
                    }
                    lastPoint = currentPoint;
                }
            }
            document.getElementById('loading').style.display = 'none';
            setupInteraction();
        }

        function createCheckboxUI(day) {
            let dNum = parseInt(day);
            let targetCol = (dNum <= 11) ? 'onward-col' : 'return-col';
            let col = document.getElementById(targetCol);
            let label = L.DomUtil.create('label', 'layer-label', col);
            label.innerHTML = `<input type="checkbox" class="day-check" data-day="${day}" checked> Day ${day}`;
        }

        function setupInteraction() {
            document.getElementById('layer-toggle-btn').onclick = () => {
                document.getElementById('custom-layer-panel').style.display = 'block';
                document.getElementById('menu-overlay').style.display = 'block';
            };
            document.getElementById('close-menu').onclick = document.getElementById('menu-overlay').onclick = () => {
                document.getElementById('custom-layer-panel').style.display = 'none';
                document.getElementById('menu-overlay').style.display = 'none';
            };

            // Master Toggles
            document.getElementById('onward-all').onchange = function() {
                let state = this.checked;
                document.querySelectorAll('.day-check').forEach(cb => {
                    if(parseInt(cb.dataset.day) <= 11) {
                        cb.checked = state;
                        state ? map.addLayer(dayGroups[cb.dataset.day]) : map.removeLayer(dayGroups[cb.dataset.day]);
                    }
                });
            };
            document.getElementById('return-all').onchange = function() {
                let state = this.checked;
                document.querySelectorAll('.day-check').forEach(cb => {
                    if(parseInt(cb.dataset.day) >= 12) {
                        cb.checked = state;
                        state ? map.addLayer(dayGroups[cb.dataset.day]) : map.removeLayer(dayGroups[cb.dataset.day]);
                    }
                });
            };

            // Individual Toggles
            document.querySelectorAll('.day-check').forEach(cb => {
                cb.onchange = function() {
                    this.checked ? map.addLayer(dayGroups[this.dataset.day]) : map.removeLayer(dayGroups[this.dataset.day]);
                };
            });
        }

        // GPS Blue Dot
        var uMarker = L.circleMarker([0,0], { radius: 8, fillColor: "#1a73e8", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 });
        var locateControl = L.control({position: 'topleft'});
        locateControl.onAdd = function() {
            var div = L.DomUtil.create('div', 'leaflet-bar');
            div.style.background = 'white'; div.style.padding = '8px'; div.style.cursor = 'pointer'; div.innerHTML = '📍';
            div.onclick = function() {
                navigator.geolocation.watchPosition(pos => {
                    let lat = pos.coords.latitude, lng = pos.coords.longitude;
                    uMarker.setLatLng([lat, lng]).addTo(map).bindPopup(`<b>You</b><br><button class="sos-btn" onclick="navigator.clipboard.writeText('${lat.toFixed(5)},${lng.toFixed(5)}');alert('Copied!')">🆘 Copy GPS</button>`);
                    map.setView([lat, lng], 14);
                }, null, {enableHighAccuracy: true});
            };
            return div;
        };
        locateControl.addTo(map);

        init();
    </script>
</body>
</html>
