<!DOCTYPE html>
<html>
<head>
    <title>Trip Plan - Final Expedition Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: Arial, sans-serif; }
        #map { height: 100vh; height: 100dvh; width: 100vw; }
        #loading {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px 20px; border-radius: 8px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.4); }
        .info-box { font-size: 13px; line-height: 1.4; min-width: 220px; }
        .hotel-tag { background: #e8f4f8; border: 1px solid #3498db; padding: 6px; border-radius: 4px; margin-top: 8px; font-weight: bold; display: block; color: #2980b9; }
        .alt-tag { background:#ffdddd; color:#c0392b; padding:6px; border-radius:4px; font-weight:bold; margin-top:8px; font-size:12px; border: 1px solid #e74c3c; }
        .warn-tag { background:#fcf3cf; border: 1px solid #f1c40f; padding:8px; border-radius:4px; color:#d35400; font-size:12px; margin-top:10px; font-weight:bold; }
        .refresh-btn { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .sos-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .custom-heart-icon { font-size: 20px; text-shadow: 0px 2px 4px rgba(0,0,0,0.5); line-height: 20px; }
    </style>
</head>
<body>
    <div id="loading">📡 Syncing Live Itinerary... <span id="prog"></span></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SHEET_ID = '1EzJ4cRVo-qj0ciKSfd1dWFLKh3zzH60HMDWh9GDmtJY';
        const GID = '327253181';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        const cityCoords = {
            'Trivandrum': [8.5241, 76.9366], 'Bangalore': [12.9716, 77.5946], 'Hyderabad': [17.3850, 78.4867],
            'Nagpur': [21.1458, 79.0882], 'Kota': [25.1825, 75.8391], 'Jaipur': [26.9124, 75.7873],
            'Amritsar': [31.6340, 74.8723], 'Srinagar': [34.0837, 74.7973], 'Kargil': [34.5539, 76.1330],
            'Leh': [34.1526, 77.5771], 'Nubra': [34.6863, 77.5673], 'Pangong': [33.7595, 78.6674],
            'Jispa': [32.6455, 77.1806], 'Manali': [32.2396, 77.1887], 'Shimla': [31.1048, 77.1734],
            'Agra': [27.1767, 78.0081], 'Jhansi': [25.4484, 78.5685]
        };

        const elevs = {'Dras': 10826, 'Kargil': 8780, 'Lamayuru': 11520, 'Leh': 11482, 'Khardung La': 17582, 'Nubra': 10000, 'Pangong': 13862, 'Sarchu': 14070, 'Jispa': 10500};

        var map = L.map('map', {zoomControl: false}).setView([22.0, 78.0], 5);
        L.control.zoom({position: 'topright'}).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        var routeGroup = L.layerGroup().addTo(map);
        var markerGroup = L.layerGroup().addTo(map);

        async function loadData() {
            try {
                let resp = await fetch(CSV_URL);
                if (!resp.ok) resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL));
                const text = await resp.text();
                const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
                const headers = rows[0];
                let itinerary = [];
                for(let i=1; i < rows.length; i++) {
                    if (rows[i].length < 3) continue;
                    let rowData = {};
                    rows[i].forEach((val, idx) => { if(headers[idx]) rowData[headers[idx]] = val; });
                    if(rowData['To']) itinerary.push(rowData);
                }
                processTrip(itinerary);
            } catch (e) { document.getElementById('loading').innerHTML = "⚠️ Sync Error. Check Internet."; }
        }

        async function processTrip(data) {
            let lastPoint = cityCoords['Trivandrum'];

            for (let row of data) {
                let day = row['Day'], from = row['From'], to = row['To'], stay = row['Night Stay'], stops = row['Key Stops'], road = row['Road Condition'], date = row['Date'], time = row['Drive Time'];
                let lat = parseFloat(row['Lat']), lng = parseFloat(row['Lng']);
                let currentPoint = (!isNaN(lat) && !isNaN(lng)) ? [lat, lng] : cityCoords[to];

                if (currentPoint) {
                    // Marker with Alt Warning
                    let altText = elevs[to] ? `<div class="alt-tag">⚠️ High Altitude: ~${elevs[to].toLocaleString()} ft</div>` : "";
                    L.marker(currentPoint, {
                        icon: L.divIcon({ html: `<div style="background:#e74c3c; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`, className: '', iconSize: [12, 12] })
                    }).bindPopup(`<div class="info-box"><b>📍 ${to}</b><br>${date}${altText}<div class="hotel-tag">🏨 Stay: ${stay}</div></div>`).addTo(markerGroup);

                    // Route with Cache & Pro Detail
                    let cacheKey = `trip_v7_${from}_${to}_${JSON.stringify(currentPoint)}`;
                    let cached = localStorage.getItem(cacheKey);
                    let poly;

                    if (cached) poly = JSON.parse(cached);
                    else {
                        try {
                            let r = await fetch(`https://router.project-osrm.org/route/v1/driving/${lastPoint[1]},${lastPoint[0]};${currentPoint[1]},${currentPoint[0]}?overview=full&geometries=geojson`);
                            let res = await r.json();
                            if(res.routes?.[0]) { poly = res.routes[0].geometry.coordinates.map(c => [c[1], c[0]]); localStorage.setItem(cacheKey, JSON.stringify(poly)); }
                            await new Promise(res => setTimeout(res, 600));
                        } catch (e) { console.warn("Route skip"); }
                    }

                    if(poly) {
                        L.polyline(poly, { color: 'white', weight: 10, opacity: 0.4 }).addTo(routeGroup);
                        let warn = (day >= 8 && day <= 17) ? `<div class="warn-tag">🌙 MOUNTAIN WARNING: Sunsets bring black ice. Reach by 5:30 PM.</div>` : "";
                        L.polyline(poly, { color: '#3498db', weight: 6, opacity: 0.9 })
                            .bindPopup(`<div class="info-box">
                                <h3 style="margin:0 0 10px 0; border-bottom:2px solid #3498db; padding-bottom:5px;">🗓️ Day ${day} - ${date}</h3>
                                <b>🛣️ Route:</b> ${from} ➔ ${to}<br>
                                <b>⭐ Stops:</b> ${stops}<br>
                                <b>⏱️ Est. Time:</b> ${time}<br>
                                <b>🚧 Road:</b> ${road}
                                ${warn}
                            </div>`).addTo(routeGroup);
                    }
                    lastPoint = currentPoint;
                }
                document.getElementById('prog').innerText = `Day ${day}...`;
            }
            document.getElementById('loading').style.display = 'none';
            addControls();
        }

        function addControls() {
            var ctrl = L.control({position: 'topright'});
            ctrl.onAdd = () => {
                var div = L.DomUtil.create('div');
                div.innerHTML = `<button class="refresh-btn" onclick="localStorage.clear(); location.reload();">🔄 Refresh Itinerary</button>`;
                return div;
            };
            ctrl.addTo(map);
        }

        var uMarker = L.circleMarker([0,0], { radius: 8, fillColor: "#1a73e8", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 });
        var locateControl = L.control({position: 'topleft'});
        locateControl.onAdd = function() {
            var div = L.DomUtil.create('div', 'leaflet-bar');
            div.style.background = 'white'; div.style.padding = '8px'; div.style.cursor = 'pointer'; div.innerHTML = '📍';
            div.onclick = function() {
                navigator.geolocation.watchPosition(pos => {
                    let lat = pos.coords.latitude.toFixed(5), lng = pos.coords.longitude.toFixed(5);
                    uMarker.setLatLng([lat, lng]).addTo(map).bindPopup(`<b>Your Location</b><br><button class="sos-btn" onclick="navigator.clipboard.writeText('${lat},${lng}');alert('GPS Copied!')">🆘 Copy GPS</button>`);
                    map.setView([lat, lng], 14);
                }, null, {enableHighAccuracy: true});
            };
            return div;
        };
        locateControl.addTo(map);

        loadData();
    </script>
</body>
</html>
